<style>
    /* Неоновый стиль */
    :root {
        --neon-blue: #00f2ff;
        --neon-purple: #bd00ff;
        --bg-dark: #121212;
    }

    body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
    
    .login-box, .chat-container {
        background: #161616;
        border: 1px solid #333;
        padding: 20px;
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
    }

    input {
        background: #000; color: #fff; border: 1px solid #444;
        padding: 10px; width: 100%; box-sizing: border-box;
    }

    input:focus { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(189, 0, 255, 0.4); outline: none; }

    .action-btn {
        background: transparent; border: 1px solid var(--neon-blue);
        color: var(--neon-blue); padding: 10px 20px; cursor: pointer;
        text-shadow: 0 0 5px var(--neon-blue); transition: 0.3s;
    }

    .action-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

    h2 { text-shadow: 0 0 10px var(--neon-blue); }
    .msg-author { color: var(--neon-blue); }
</style>

<div id="loginOverlay">
    <div class="login-box">
        <h2>NOVO Malinograd</h2>
        <input type="text" id="loginUser" placeholder="Никнейм (латиница)">
        <input type="password" id="loginPass" placeholder="Пароль (мин. 8, с цифрами)">
        <button class="action-btn" onclick="pressLogin()" id="bLogin">Войти</button>
        <button class="action-btn" onclick="pressRegister()" id="bReg">Регистрация</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCj-GoD1eBbTWjNHeKNN-p2ymvC-zL2B0",
        authDomain: "test-novo-malinogrda-rrp.firebaseapp.com",
        projectId: "test-novo-malinogrda-rrp",
        storageBucket: "test-novo-malinogrda-rrp.firebasestorage.app",
        messagingSenderId: "70609134352",
        appId: "1:70609134352:web:8b42473392454a35388645"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    let currentUser = null;

    window.pressLogin = () => handleAuth(document.getElementById('loginUser').value.trim(), document.getElementById('loginPass').value.trim(), 'login');
    window.pressRegister = () => handleAuth(document.getElementById('loginUser').value.trim(), document.getElementById('loginPass').value.trim(), 'register');

    async function handleAuth(username, pass, type) {
        if (!/^[a-zA-Z0-9]+$/.test(username)) return alert("Ник: только латиница!");
        if (type === 'register' && !/^(?=.*[A-Z])(?=.*\d).{8,}$/.test(pass)) return alert("Пароль: 8+ символов, 1 заглавная, 1 цифра!");

        try {
            const userRef = doc(db, "users", username.toLowerCase());
            const userSnap = await getDoc(userRef);

            if (type === 'login') {
                if (!userSnap.exists() || userSnap.data().password !== pass) return alert("Ошибка входа!");
                currentUser = userSnap.data();
            } else {
                if (userSnap.exists()) return alert("Ник занят!");
                currentUser = { username, password: pass, level: 1, balance: 5000, fraction: "Гражданский" };
                await setDoc(userRef, currentUser);
            }
            
            document.getElementById('loginOverlay').style.display = 'none';
            alert("Успешно!");
        } catch (e) { alert("Ошибка сервера!"); }
    }
</script>
