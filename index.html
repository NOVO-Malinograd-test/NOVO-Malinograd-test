<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCj-GoD1eBbTWjNHeKNN-p2ymvC-zL2B0",
        authDomain: "test-novo-malinogrda-rrp.firebaseapp.com",
        projectId: "test-novo-malinogrda-rrp",
        storageBucket: "test-novo-malinogrda-rrp.firebasestorage.app",
        messagingSenderId: "70609134352",
        appId: "1:70609134352:web:8b42473392454a35388645"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentUser = null;

    // Авто-вход при загрузке
    window.addEventListener('DOMContentLoaded', () => {
        const savedUser = localStorage.getItem('novo_username');
        const savedPass = localStorage.getItem('novo_password');
        if(savedUser && savedPass) {
            handleAuth(savedUser, savedPass, 'login', true);
        }
    });

    window.pressLogin = () => handleAuth(document.getElementById('loginUser').value.trim(), document.getElementById('loginPass').value.trim(), 'login', false);
    window.pressRegister = () => handleAuth(document.getElementById('loginUser').value.trim(), document.getElementById('loginPass').value.trim(), 'register', false);

    async function handleAuth(username, pass, type, isAuto) {
        if (!username || !pass) { if(!isAuto) alert("Введите данные!"); return; }

        // Проверки: Латиница и сложность пароля
        if (!/^[a-zA-Z0-9]+$/.test(username)) { alert("Ник: только английские буквы и цифры!"); resetAuthButtons(); return; }
        if (type === 'register' && !/^(?=.*[A-Z])(?=.*\d).{8,}$/.test(pass)) { 
            alert("Пароль: мин 8 символов, 1 заглавная, 1 цифра!"); resetAuthButtons(); return; 
        }

        try {
            const userRef = doc(db, "users", username.toLowerCase());
            const userSnap = await getDoc(userRef);

            if (type === 'login') {
                if (!userSnap.exists() || userSnap.data().password !== pass) { alert("Ошибка входа!"); resetAuthButtons(); return; }
                currentUser = userSnap.data();
            } else {
                if (userSnap.exists()) { alert("Ник занят!"); resetAuthButtons(); return; }
                currentUser = { username, password: pass, level: 1, balance: 5000, fraction: "Гражданский" };
                await setDoc(userRef, currentUser);
            }

            localStorage.setItem('novo_username', currentUser.username);
            localStorage.setItem('novo_password', currentUser.password);

            updateUI();
        } catch (e) { alert("Ошибка соединения!"); resetAuthButtons(); }
    }

    function updateUI() {
        document.getElementById('playerName').innerText = currentUser.username;
        document.getElementById('playerLevel').innerText = currentUser.level + " LVL";
        document.getElementById('playerBalance').innerText = currentUser.balance.toLocaleString() + " руб.";
        document.getElementById('playerFraction').innerText = currentUser.fraction;
        document.getElementById('playerAvatar').src = `https://www.roblox.com/avatar-thumbnail/image?username=${encodeURIComponent(currentUser.username)}&width=150&height=150&format=png`;

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainSiteContent').style.display = 'grid';
        initGlobalChat();
    }

    function resetAuthButtons() { document.getElementById('bLogin').disabled = false; document.getElementById('bReg').disabled = false; }
    window.pressLogout = () => { localStorage.clear(); location.reload(); };

    function initGlobalChat() {
        const chatBox = document.getElementById('chatMessages');
        onSnapshot(query(collection(db, "chat"), orderBy("createdAt", "asc"), limit(50)), (snapshot) => {
            chatBox.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                if(d.type === "pm" && d.author !== currentUser.username && d.target !== currentUser.username) return;
                chatBox.innerHTML += `<div class="msg"><b>${d.author}:</b> ${d.text}</div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "chat"), {
            author: currentUser.username,
            text: input.value,
            createdAt: serverTimestamp(),
            type: document.getElementById('pmTarget').value ? "pm" : "global",
            target: document.getElementById('pmTarget').value
        });
        input.value = "";
    };

    window.checkEnter = (e) => { if(e.key === 'Enter') window.sendMessage(); }
</script>
