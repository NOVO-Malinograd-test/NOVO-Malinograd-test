<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title>NOVO RP | Dashboard</title>

    <link id="dynamicFavicon" rel="icon" type="image/png" href="favicon.png">

    <style>

        body { background: #191b1d; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 220px; background: #232527; padding: 20px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid #333; }

        .tab-btn { padding: 10px; background: #2d2f31; border: none; color: #ccc; cursor: pointer; border-radius: 6px; text-align: left; font-weight: bold; }

        .tab-btn.active { background: #0084ff; color: white; }

        .content { flex: 1; padding: 30px; overflow-y: auto; }

        .tab-pane { display: none; }

        .tab-pane.active { display: block; }

        .card { background: #232527; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; max-width: 600px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }

        .forum-link { display: block; padding: 15px; background: #2d2f31; margin-bottom: 10px; border-radius: 6px; text-decoration: none; color: white; border-left: 4px solid #0084ff; transition: 0.2s; }

        .forum-link:hover { background: #393b3d; }

    </style>

</head>

<body>



<div class="sidebar">

    <h3 style="color:#0084ff">NOVO RP</h3>

    <button class="tab-btn active" onclick="showTab('profile')">👤 Профиль</button>

    <button class="tab-btn" onclick="showTab('chat')">💬 Чат</button>

    <button class="tab-btn" onclick="showTab('friends')">👥 Друзья</button>

    <button class="tab-btn" onclick="showTab('forum')">🌐 Форум</button>

    <button class="tab-btn" onclick="showTab('about')">ℹ️ О проекте</button>

</div>



<div class="content">

    <div id="tab-profile" class="tab-pane active">

        <div class="card">

            <img id="pAvatar" style="width:100px; border-radius:50%; border:2px solid #0084ff">

            <h2 id="pName">Загрузка...</h2>

            <div class="stat-grid">

                <p>Уровень: <b>15</b></p>

                <p>Баланс: <b>5,000$</b></p>

                <p>Фракция: <b>Полиция</b></p>

            </div>

        </div>

    </div>



    <div id="tab-chat" class="tab-pane">

        <div id="chatBox" style="height:300px; background:#111; overflow-y:auto; padding:10px; margin-bottom:10px; border-radius:6px;"></div>

        <input id="chatInput" style="padding:10px; width:70%; background:#222; color:white; border:1px solid #444;" placeholder="Сообщение...">

        <button onclick="sendMessage()" style="padding:10px; background:#0084ff; border:none; color:white; cursor:pointer">Отправить</button>

    </div>



    <div id="tab-forum" class="tab-pane">

        <a href="#" class="forum-link">📖 Общий форум проекта</a>

        <a href="#" class="forum-link" style="border-left-color: #ff4444;">⚠️ Баги и ошибки</a>

        <a href="#" class="forum-link" style="border-left-color: #ffaa00;">💡 Идеи и улучшения</a>

    </div>



    <div id="tab-friends" class="tab-pane">

        <div class="card">

            <input id="fInput" placeholder="Ник игрока" style="padding:8px">

            <button onclick="addFriend()">Добавить</button>

            <div id="fList" style="margin-top:15px"></div>

        </div>

    </div>

    

    <div id="tab-about" class="tab-pane">

        <div class="card">

            <h2>О проекте NOVO RP</h2>

            <p>Создатель: <b>gcdgkd</b> (ID: 1049747616663080970)</p>

            <iframe src="https://discord.com/widget?id=1255866750059372554&theme=dark" width="100%" height="300" frameborder="0"></iframe>

            <a href="https://discord.gg/awynwRwQab" target="_blank" style="display:block; margin-top:15px; color:#5865F2;">Вступить в Discord</a>

        </div>

    </div>

</div>



<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";



    const firebaseConfig = {

        apiKey: "AIzaSyCj-GoD1eBbTWjnHeKNN-p2ymvC-zL2B0",

        projectId: "test-novo-malinogrda-rrp",

        appId: "1:70609134352:web:8b42473392454a35388645"

    };

    

    const db = getFirestore(initializeApp(firebaseConfig));

    let currentUser = localStorage.getItem('novo_username') || prompt("Введите ник для входа:");

    localStorage.setItem('novo_username', currentUser);



    window.showTab = (tab) => {

        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        document.getElementById('tab-' + tab).classList.add('active');

        event.target.classList.add('active');

    };



    // Обновление профиля и иконки

    const avatarUrl = `https://www.roblox.com/avatar-thumbnail/image?username=${currentUser}&width=150&height=150&format=png`;

    document.getElementById('pName').innerText = currentUser;

    document.getElementById('pAvatar').src = avatarUrl;

    document.getElementById('dynamicFavicon').href = avatarUrl;



    // Чат

    window.sendMessage = async () => {

        const text = document.getElementById('chatInput').value;

        if(!text) return;

        await addDoc(collection(db, "chat"), { author: currentUser, text: text, createdAt: new Date() });

        document.getElementById('chatInput').value = "";

    };



    onSnapshot(query(collection(db, "chat"), orderBy("createdAt", "asc")), snap => {

        const box = document.getElementById('chatBox');

        box.innerHTML = "";

        snap.forEach(d => box.innerHTML += `<div><b>${d.data().author}:</b> ${d.data().text}</div>`);

    });



    // Друзья

    window.addFriend = async () => {

        const name = document.getElementById('fInput').value;

        await setDoc(doc(db, "friends", currentUser + "_" + name), { owner: currentUser, friendName: name });

    };



    onSnapshot(query(collection(db, "friends"), where("owner", "==", currentUser)), snap => {

        const list = document.getElementById('fList');

        list.innerHTML = "";

        snap.forEach(d => list.innerHTML += `<div style="padding:5px">${d.data().friendName}</div>`);

    });

</script>

</body>

</html>
