<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NOVO Malinograd RP</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bd00ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .card { border: 1px solid var(--neon-blue); padding: 30px; width: 350px; background: #111; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        
        #mainSiteContent { display: none; padding: 20px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .panel { border: 1px solid #333; padding: 20px; background: #111; }
        input, button, select { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; margin: 5px 0; }
        button { border-color: var(--neon-blue); cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--neon-blue); color: #000; }
        
        #chatMessages { height: 400px; overflow-y: auto; border: 1px solid #222; background: #0a0a0a; margin-bottom: 10px; }
        .msg { padding: 5px 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="overlay" id="loginOverlay">
    <div class="card">
        <h2>NOVO Malinograd</h2>
        <input type="text" id="loginUser" placeholder="Никнейм">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button onclick="pressLogin()" id="bLogin">Войти</button>
        <button onclick="pressRegister()" id="bReg">Регистрация</button>
    </div>
</div>

<div id="mainSiteContent">
    <div class="panel">
        <img id="playerAvatar" style="width:100%; border:1px solid var(--neon-blue)">
        <h3>Профиль: <span id="playerName"></span></h3>
        <p>LVL: <span id="playerLevel"></span></p>
        <p>Баланс: <span id="playerBalance"></span></p>
        <p>Фракция: <span id="playerFraction"></span></p>
        <button onclick="pressLogout()">Выйти</button>
    </div>
    <div class="panel">
        <h3>Глобальный чат</h3>
        <div id="chatMessages"></div>
        <input type="text" id="pmTarget" placeholder="Кому (пусто для всех)">
        <input type="text" id="chatInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyCj-GoD1eBbTWjNHeKNN-p2ymvC-zL2B0",
        authDomain: "test-novo-malinogrda-rrp.firebaseapp.com",
        projectId: "test-novo-malinogrda-rrp",
        storageBucket: "test-novo-malinogrda-rrp.firebasestorage.app",
        messagingSenderId: "70609134352",
        appId: "1:70609134352:web:8b42473392454a35388645"
    }));

    let currentUser = null;

    // Авто-вход
    window.addEventListener('DOMContentLoaded', () => {
        const u = localStorage.getItem('novo_username');
        const p = localStorage.getItem('novo_password');
        if(u && p) handleAuth(u, p, 'login', true);
    });

    window.pressLogin = () => handleAuth(document.getElementById('loginUser').value.trim(), document.getElementById('loginPass').value.trim(), 'login', false);
    window.pressRegister = () => handleAuth(document.getElementById('loginUser').value.trim(), document.getElementById('loginPass').value.trim(), 'register', false);
    window.pressLogout = () => { localStorage.clear(); location.reload(); };

    async function handleAuth(username, pass, type, isAuto) {
        if (!/^[a-zA-Z0-9]+$/.test(username)) return alert("Ник: только латиница!");
        if (type === 'register' && !/^(?=.*[A-Z])(?=.*\d).{8,}$/.test(pass)) return alert("Пароль: 8+ символов, 1 цифра, 1 заглавная!");

        try {
            const ref = doc(db, "users", username.toLowerCase());
            const snap = await getDoc(ref);

            if (type === 'login') {
                if (!snap.exists() || snap.data().password !== pass) return alert("Ошибка входа!");
                currentUser = snap.data();
            } else {
                if (snap.exists()) return alert("Ник занят!");
                currentUser = { username, password: pass, level: 1, balance: 5000, fraction: "Гражданский" };
                await setDoc(ref, currentUser);
            }

            localStorage.setItem('novo_username', currentUser.username);
            localStorage.setItem('novo_password', currentUser.password);

            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainSiteContent').style.display = 'grid';
            document.getElementById('playerName').innerText = currentUser.username;
            document.getElementById('playerLevel').innerText = currentUser.level;
            document.getElementById('playerBalance').innerText = currentUser.balance;
            document.getElementById('playerFraction').innerText = currentUser.fraction;
            document.getElementById('playerAvatar').src = `https://www.roblox.com/avatar-thumbnail/image?username=${encodeURIComponent(currentUser.username)}&width=150&height=150&format=png`;

            initChat();
        } catch (e) { alert("Ошибка соединения!"); }
    }

    function initChat() {
        onSnapshot(query(collection(db, "chat"), orderBy("createdAt", "asc")), snap => {
            const box = document.getElementById('chatMessages');
            box.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                if(data.type === "pm" && data.author !== currentUser.username && data.target !== currentUser.username) return;
                box.innerHTML += `<div class="msg"><b>${data.author}:</b> ${data.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        const target = document.getElementById('pmTarget');
        if(!input.value) return;
        await addDoc(collection(db, "chat"), { 
            author: currentUser.username, 
            text: input.value, 
            type: target.value ? "pm" : "global",
            target: target.value,
            createdAt: serverTimestamp() 
        });
        input.value = "";
    };
</script>
</body>
</html>
