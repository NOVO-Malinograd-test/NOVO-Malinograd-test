<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NOVO RP | Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #0f1011; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
        }
        .auth-card { 
            background: #191b1d; 
            padding: 40px; 
            border-radius: 16px; 
            width: 340px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d2f31;
            text-align: center;
        }
        h2 { margin-bottom: 25px; font-weight: 600; color: #fff; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            background: #232527; 
            border: 1px solid #333; 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #0084ff; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        .btn-login { background: #0084ff; color: white; }
        .btn-login:hover { background: #0066cc; }
        .btn-reg { background: #2d2f31; color: #ccc; }
        .btn-reg:hover { background: #393b3d; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Добро пожаловать</h2>
    <input id="uName" placeholder="Никнейм">
    <input id="uPass" type="password" placeholder="Пароль">
    <div class="btn-group">
        <button class="btn-login" onclick="auth('login')">Войти</button>
        <button class="btn-reg" onclick="auth('reg')">Регистрация</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        // Вставь сюда свой конфиг
        apiKey: "ТВОЙ_API_KEY",
        projectId: "test-novo-malinogrda-rrp",
        appId: "1:70609134352:web:8b42473392454a35388645"
    }));

    window.auth = async (type) => {
        const name = document.getElementById('uName').value.trim().toLowerCase();
        const pass = document.getElementById('uPass').value;
        if(!name || !pass) return alert("Заполни все поля!");
        
        const ref = doc(db, "users", name);
        const snap = await getDoc(ref);

        if (type === 'reg') {
            if (snap.exists()) return alert("Этот ник уже занят.");
            await setDoc(ref, { password: pass, regDate: new Date().toLocaleDateString() });
            alert("Аккаунт создан!");
        } else {
            if (!snap.exists() || snap.data().password !== pass) return alert("Неверный ник или пароль.");
            localStorage.setItem('user', name);
            window.location.href = "dashboard.html"; // Перенаправляем на основной сайт
        }
    };
</script>
</body>
</html>
