<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title id="siteTitle">NOVO RP | Loading...</title>

    <link id="dynamicFavicon" rel="shortcut icon" href="https://www.roblox.com/favicon.ico">

    <style>

        body { background: #191b1d; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 220px; background: #232527; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #333; }

        .tab-btn { padding: 12px; background: #2d2f31; border: none; color: #ccc; cursor: pointer; border-radius: 6px; text-align: left; font-weight: bold; transition: 0.2s; }

        .tab-btn.active { background: #0084ff; color: white; }

        .content { flex: 1; padding: 40px; overflow-y: auto; }

        .tab-pane { display: none; }

        .tab-pane.active { display: block; }

        .card { background: #232527; padding: 25px; border-radius: 12px; border: 1px solid #333; max-width: 600px; }

        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #0084ff; object-fit: cover; }

        .friend-item { padding: 12px; background: #2d2f31; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }

        .btn-mini { padding: 5px 10px; background: #0084ff; border: none; color: white; cursor: pointer; border-radius: 4px; font-size: 12px; }

        #chatBox { height: 300px; background: #111; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }

        .rbx-header { background-color: #232527; height: 45px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #111; }

    </style>

</head>

<body>



<div class="rbx-header">

    <div style="display:flex; align-items:center; gap:10px;">

        <div style="width:25px; height:25px; background:url('https://images.rbxcdn.com/9fb92cbf3934bc29030a1de3979e93b2.svg') no-repeat center; background-size:contain;"></div>

        <div id="headerTitle">NOVO RP</div>

    </div>

    <div style="display:flex; align-items:center; gap:10px;">

        <img id="headerAvatar" src="" style="width:24px; height:24px; border-radius:50%; display:none;">

        <span id="headerUser">Вход...</span>

    </div>

</div>



<div style="display:flex; flex:1;">

    <div class="sidebar">

        <button class="tab-btn active" onclick="showTab('profile')">👤 Профиль</button>

        <button class="tab-btn" onclick="showTab('chat')">💬 Чат</button>

        <button class="tab-btn" onclick="showTab('friends')">👥 Друзья</button>

        <button class="tab-btn" onclick="showTab('about')">ℹ️ О проекте</button>

        <button class="tab-btn" onclick="localStorage.clear(); location.reload()" style="margin-top:auto; color:#ff4444">Выход</button>

    </div>



    <div class="content">

        <div id="tab-profile" class="tab-pane active">

            <div class="card">

                <img id="pAvatar" class="avatar">

                <h2 id="pName">Загрузка...</h2>

                <p>Дата регистрации: 24.06.2026</p>

            </div>

        </div>



        <div id="tab-chat" class="tab-pane">

            <div id="chatBox"></div>

            <input id="chatInput" style="width:70%; padding:10px; background:#222; color:white; border:none" placeholder="Сообщение...">

            <button onclick="sendMessage()" style="padding:10px; background:#0084ff; border:none; color:white">Отправить</button>

        </div>



        <div id="tab-friends" class="tab-pane">

            <input id="fInput" placeholder="Никнейм игрока..." style="padding:10px">

            <button onclick="addFriend()" style="padding:10px">Добавить</button>

            <div id="fList" style="margin-top:20px"></div>

        </div>



        <div id="tab-about" class="tab-pane">

            <div class="card">

                <h2>О проекте NOVO Malinograd RP</h2>

                <p><strong>Создатель:</strong> gcdgkd</p>

                <p><strong>Discord ID:</strong> <code>1049747616663080970</code></p>

                <iframe src="https://discord.com/widget?id=1495843468592021584&theme=dark" width="100%" height="300" frameborder="0"></iframe>

                <a href="https://discord.gg/awynwRwQab" target="_blank" style="display:block; margin-top:15px; color:#5865F2;">Перейти в Дискорд</a>

            </div>

        </div>

    </div>

</div>



<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";



    const firebaseConfig = {

      apiKey: "AIzaSyCj-GoD1eBbTWjnHeKNN-p2ymvC-zL2B0",

      projectId: "test-novo-malinogrda-rrp",

      appId: "1:70609134352:web:8b42473392454a35388645"

    };

    

    const db = getFirestore(initializeApp(firebaseConfig));

    let currentUser = localStorage.getItem('novo_username') || prompt("Ваш ник в NOVO Malinograd RP:");

    if(currentUser) localStorage.setItem('novo_username', currentUser);



    window.showTab = (tab) => {

        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        document.getElementById('tab-' + tab).classList.add('active');

        event.target.classList.add('active');

    };



    if(currentUser) {

        const avatarUrl = `https://www.roblox.com/avatar-thumbnail/image?username=${encodeURIComponent(currentUser)}&width=150&height=150&format=png`;

        document.getElementById('siteTitle').innerText = currentUser + " | NOVO RP";

        document.getElementById('headerTitle').innerText = currentUser + " | Dashboard";

        document.getElementById('headerUser').innerText = currentUser;

        document.getElementById('headerAvatar').src = avatarUrl;

        document.getElementById('headerAvatar').style.display = 'block';

        document.getElementById('dynamicFavicon').href = avatarUrl;

        document.getElementById('pName').innerText = currentUser;

        document.getElementById('pAvatar').src = avatarUrl;

    }



    window.addFriend = async () => {

        const name = document.getElementById('fInput').value.trim();

        if(name) await setDoc(doc(db, "friends", currentUser + "_" + name), { owner: currentUser, friendName: name });

    };



    onSnapshot(query(collection(db, "friends"), where("owner", "==", currentUser || "")), snap => {

        const list = document.getElementById('fList');

        list.innerHTML = "";

        snap.forEach(d => list.innerHTML += `<div class="friend-item">${d.data().friendName}</div>`);

    });



    window.sendMessage = async () => {

        const text = document.getElementById('chatInput').value;

        if(text) await addDoc(collection(db, "chat"), { author: currentUser, text: text, createdAt: new Date() });

        document.getElementById('chatInput').value = "";

    };



    onSnapshot(query(collection(db, "chat"), orderBy("createdAt", "asc")), snap => {

        const box = document.getElementById('chatBox');

        box.innerHTML = "";

        snap.forEach(d => box.innerHTML += `<div><b>${d.data().author}:</b> ${d.data().text}</div>`);

    });

</script>

</body>

</html>
